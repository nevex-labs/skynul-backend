# fly.toml app configuration file generated for skynul-backend on 2026-03-18T23:21:54-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'skynul-backend'
primary_region = 'ams'

[build]

[env]
  SKYNUL_PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/ping"
    timeout = "5s"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
