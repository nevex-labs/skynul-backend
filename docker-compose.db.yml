version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: skynul-postgres
    environment:
      POSTGRES_USER: skynul
      POSTGRES_PASSWORD: skynul_password
      POSTGRES_DB: skynul
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skynul"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Opcional: pgAdmin para administrar la DB
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: skynul-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@skynul.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - admin

volumes:
  postgres_data:
